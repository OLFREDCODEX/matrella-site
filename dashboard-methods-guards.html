<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dashboard privata | Methods Guards AI</title>

  <style>
    :root {
      --bg: #f7f5ef;
      --paper: #ffffff;
      --ink: #1f2933;
      --muted: #6b7280;
      --accent: #355c7d;
      --line: #e5e0d8;
      --soft: #edf2f7;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      margin: 0;
      line-height: 1.6;
    }

    main {
      width: min(900px, 92%);
      margin: auto;
      padding: 70px 0;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: -0.05em;
      margin-bottom: 16px;
    }

    .lead {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 28px;
    }

    .box {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      margin-top: 24px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--soft);
      font: inherit;
      box-sizing: border-box;
      margin-top: 8px;
    }

    button {
      margin-top: 16px;
      padding: 13px 20px;
      border-radius: 999px;
      border: none;
      background: var(--ink);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .note {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .card {
      background: var(--paper);
      border: 2px solid var(--accent);
      border-radius: 24px;
      padding: 24px;
    }

    .label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .value {
      font-size: 2.1rem;
      font-weight: 800;
      line-height: 1;
    }

    .hidden {
      display: none;
    }

    .error {
      color: #9f1239;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>Dashboard privata</h1>

    <p class="lead">
      Area privata per controllare gli analytics essenziali di Methods Guards AI.
    </p>

    <div class="box">
      <label for="secretInput"><strong>Chiave privata analytics</strong></label>
      <input id="secretInput" type="password" placeholder="Inserisci la chiave analytics" />

      <button type="button" onclick="loadAnalytics()">Mostra dashboard</button>

      <p class="note">
        La chiave non viene salvata nel sito. Viene usata solo per interrogare l’endpoint analytics.
      </p>

      <p id="status" class="note"></p>
    </div>

    <div id="dashboard" class="grid hidden">
      <div class="card">
        <div class="label">Data UTC</div>
        <div id="dateUTC" class="value">—</div>
      </div>

      <div class="card">
        <div class="label">Analisi totali</div>
        <div id="totalAnalyses" class="value">—</div>
      </div>

      <div class="card">
        <div class="label">Analisi oggi</div>
        <div id="todayAnalyses" class="value">—</div>
      </div>

      <div class="card">
        <div class="label">Identificativi oggi</div>
        <div id="uniqueIdentifiersToday" class="value">—</div>
      </div>

      <div class="card">
        <div class="label">Media analisi per identificativo oggi</div>
        <div id="avgAnalysesPerIdentifierToday" class="value">—</div>
      </div>
    </div>
  </main>

  <script>
    async function loadAnalytics() {
      const secretInput = document.getElementById("secretInput");
      const status = document.getElementById("status");
      const dashboard = document.getElementById("dashboard");

      const secret = secretInput.value.trim();

      if (!secret) {
        status.innerHTML = '<span class="error">Inserisci la chiave analytics.</span>';
        dashboard.classList.add("hidden");
        return;
      }

      status.innerText = "Caricamento dati...";
      dashboard.classList.add("hidden");

      try {
        const url = "https://methods-guards-backend.vercel.app/api/analytics?secret=" + encodeURIComponent(secret);

        const res = await fetch(url);
        const data = await res.json();

        if (!res.ok) {
          status.innerHTML = '<span class="error">' + (data.error || "Accesso non autorizzato") + '</span>';
          dashboard.classList.add("hidden");
          return;
        }

        document.getElementById("dateUTC").innerText = data.dateUTC || "—";
        document.getElementById("totalAnalyses").innerText = formatNumber(data.totalAnalyses);
        document.getElementById("todayAnalyses").innerText = formatNumber(data.todayAnalyses);
        document.getElementById("uniqueIdentifiersToday").innerText = formatNumber(data.uniqueIdentifiersToday);
        document.getElementById("avgAnalysesPerIdentifierToday").innerText = formatNumber(data.avgAnalysesPerIdentifierToday);

        dashboard.classList.remove("hidden");
        status.innerText = "Dati caricati correttamente.";

      } catch (error) {
        status.innerHTML = '<span class="error">Errore di connessione.</span>';
        dashboard.classList.add("hidden");
      }
    }

    function formatNumber(value) {
      if (typeof value !== "number") return "—";
      return value.toLocaleString("it-IT");
    }
  </script>
</body>
</html>
