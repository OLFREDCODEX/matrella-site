<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Methods Guards AI</title>

  <style>
    :root {
      --bg: #f7f5ef;
      --paper: #ffffff;
      --ink: #1f2933;
      --muted: #6b7280;
      --accent: #355c7d;
      --line: #e5e0d8;
      --soft: #edf2f7;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      margin: 0;
      line-height: 1.6;
    }

    main {
      width: min(900px, 92%);
      margin: auto;
      padding: 70px 0;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1;
      letter-spacing: -0.06em;
      margin: 24px 0 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      max-width: 760px;
      margin: 0 0 28px;
      font-weight: 500;
    }

    .lead {
      color: var(--muted);
      font-size: 1.15rem;
      margin-bottom: 30px;
    }

    .box {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px;
      margin-top: 28px;
    }

    .support-row {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.65fr);
      gap: 16px;
      align-items: stretch;
      margin-top: 24px;
    }

    .support-row .donation-box,
    .support-row .code-box {
      margin-top: 0;
      height: 100%;
      box-sizing: border-box;
    }

    .code-box {
      padding: 22px;
      border-radius: 24px;
      border: 2px solid var(--accent);
      background: var(--paper);
    }

    .code-box label {
      font-size: 0.95rem;
    }

    .code-box input {
      padding: 8px 10px;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .code-box button {
      padding: 7px 12px;
      font-size: 0.9rem;
      margin-top: 10px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--soft);
      font: inherit;
      margin-top: 10px;
      box-sizing: border-box;
    }
