<!DOCTYPE html>
<html lang="it">
<head>
  <script defer src="cookie-consent.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="Pagamento completato | Methods Guards AI" />
  <meta property="og:description" content="Pagina tecnica di verifica pagamento per Methods Guards AI." />
  <meta property="og:url" content="https://www.matrella.it/methods-guards-success.html" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Pagamento completato | Methods Guards AI" />

  <style>
    :root {
      --bg: #f7f5ef;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #64748b;
      --accent: #2f5f87;
      --line: #ddd6c8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(247, 245, 239, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      width: min(1120px, 92%);
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 18px 0;
    }

    .logo {
      font-weight: 800;
      letter-spacing: -0.04em;
      font-size: 1.15rem;
      color: var(--ink);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    nav ul {
      display: flex;
      gap: 22px;
      list-style: none;
      color: #475569;
      font-size: 0.96rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: inherit;
      text-decoration: none;
      transition: 0.18s ease;
    }

    nav a:hover { color: var(--accent); }

    .language-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      color: #475569;
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .language-switch a,
    .language-switch span {
      color: inherit;
      padding: 2px 6px;
      border-radius: 999px;
      text-decoration: none;
    }

    .language-switch .active {
      background: var(--ink);
      color: white;
    }

    main {
      width: min(820px, 92%);
      margin: 86px auto;
      padding: 44px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 20px 70px rgba(31, 41, 55, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: -0.06em;
      line-height: 1;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    button {
      display: none;
      border: 1px solid var(--accent);
      border-radius: 999px;
      background: var(--accent);
      color: white;
      padding: 14px 22px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      nav ul { display: none; }
      main { margin-top: 54px; padding: 30px; }
    }
    .nav-toggle {
      display: none;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .nav-toggle span {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      position: relative;
    }
    .nav-toggle span::before,
    .nav-toggle span::after {
      content: "";
      position: absolute;
      left: 0;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      transition: transform 0.18s ease, top 0.18s ease, opacity 0.18s ease;
    }
    .nav-toggle span::before {
      top: -6px;
    }
    .nav-toggle span::after {
      top: 6px;
    }
    .nav.nav-open .nav-toggle span {
      background: transparent;
    }
    .nav.nav-open .nav-toggle span::before {
      top: 0;
      transform: rotate(45deg);
    }
    .nav.nav-open .nav-toggle span::after {
      top: 0;
      transform: rotate(-45deg);
    }
    @media (max-width: 980px) {
      .nav {
        position: relative;
      }
      .nav-toggle {
        display: inline-flex;
        order: 2;
      }
      .language-switch {
        order: 3;
      }
      .nav nav {
        order: 4;
        width: 100%;
      }
      .nav.nav-open nav ul {
        display: flex;
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 10px);
        flex-direction: column;
        gap: 0;
        padding: 12px;
        background: rgba(255, 255, 255, 0.97);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(31, 41, 51, 0.12);
        color: var(--ink);
        z-index: 50;
      }
      .nav.nav-open nav li + li {
        border-top: 1px solid var(--line);
      }
      .nav.nav-open nav a {
        display: block;
        padding: 12px 10px;
      }
    }
  </style>
  <link rel="stylesheet" href="mobile-fixes.css" />
</head>
<body>
  <header>
    <div class="nav">
      <a class="logo" href="index.html">Alfredo <span>Matrella</span></a>

      <button class="nav-toggle" type="button" aria-label="Apri menu" aria-expanded="false">
        <span aria-hidden="true"></span>
      </button>
      <nav aria-label="Navigazione principale">
        <ul>
          <li><a href="missione-ricerca.html">Mission</a></li>
          <li><a href="servizi.html">Servizi</a></li>
          <li><a href="methods-guards.html">Methods Guards AI</a></li>
          <li><a href="pubblicazioni.html">Pubblicazioni</a></li>
          <li><a href="esperienze.html">Esperienze</a></li>
          <li><a href="comunicazioni.html">Comunicazioni</a></li>
          <li><a href="index.html#opportunita">Opportunit&agrave;</a></li>
          <li><a href="contatti.html">Contatti</a></li>
        </ul>
      </nav>
      <div class="language-switch" aria-label="Selezione lingua">
        <span class="active">IT</span>
        <a href="en/methods-guards.html">EN</a>
      </div>
    </div>
  </header>

  <main>
    <h1>Verifica pagamento...</h1>
    <p id="message">Attendi qualche secondo.</p>
    <button id="backButton" onclick="goBack()">Vai all'analisi</button>
  </main>

  <script>
    async function verifyPayment() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const message = document.getElementById("message");
      const title = document.querySelector("h1");
      const backButton = document.getElementById("backButton");

      if (!sessionId) {
        title.innerText = "Pagamento non verificabile";
        message.innerText = "Session ID mancante.";
        backButton.style.display = "inline-block";
        return;
      }

      try {
        const response = await fetch("https://methods-guards-backend.vercel.app/api/verify-checkout-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId })
        });

        const data = await response.json();

        if (data.paid === true) {
          localStorage.setItem("methodsGuardsPaid", "true");
          localStorage.setItem("methodsGuardsSessionId", data.sessionId);
          localStorage.setItem("methodsGuardsPaidProductType", data.productType || "");
          localStorage.setItem("methodsGuardsPaidFileName", data.fileName || "");

          title.innerText = "Pagamento completato";
          message.innerText = "Pagamento verificato. Ora puoi generare il report completo.";
        } else {
          title.innerText = "Pagamento non completato";
          message.innerText = "Non risulta un pagamento completato.";
        }

        backButton.style.display = "inline-block";
      } catch (error) {
        title.innerText = "Errore di verifica";
        message.innerText = "Errore durante la verifica del pagamento.";
        backButton.style.display = "inline-block";
      }
    }

    function goBack() {
      window.location.href = "/methods-guards.html";
    }

    verifyPayment();
  </script>
  <script>
    document.querySelectorAll(".nav").forEach((nav) => {
      const toggle = nav.querySelector(".nav-toggle");
      if (!toggle) return;
      toggle.addEventListener("click", () => {
        const isOpen = nav.classList.toggle("nav-open");
        toggle.setAttribute("aria-expanded", String(isOpen));
      });
      nav.querySelectorAll("nav a").forEach((link) => {
        link.addEventListener("click", () => {
          nav.classList.remove("nav-open");
          toggle.setAttribute("aria-expanded", "false");
        });
      });
    });
  </script>
</body>
</html>
